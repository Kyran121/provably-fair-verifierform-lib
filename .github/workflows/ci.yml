name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm i

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Unit Tests with Coverage
        run: npm run test:unit -- --coverage.enabled --coverage.reporter=json-summary

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Generate Coverage Badge
        uses: wjervis7/vitest-badge-action@v1
        with:
          summary-path: coverage/coverage-summary.json
          badge-path: coverage/badge.svg
          vitest-config-path: vite.config.ts
          upload-badge: false

      - name: Upload Coverage Badge Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage/badge.svg
